  <main class="study-page exam-study-page">
    <section class="study-shell exam-practice-shell">
      <div class="exam-practice-head">
        <a class="workspace-back" href="quiz.html">← Quay lại danh sách đề</a>
        <div>
          <p class="eyebrow" data-exam-practice-label>TOEIC Reading</p>
          <h1 data-exam-practice-title>Làm đề Part 5</h1>
        </div>
      </div>

      <section class="exam-section">
        <div class="exam-wireframe" aria-label="Màn hình làm đề TOEIC" data-exam-practice>
          <div class="wireframe-top" hidden>
            <span data-exam-countdown>75:00</span>
            <strong data-exam-progress>Question 1 / 8</strong>
            <button type="button" data-submit-exam>Nộp bài</button>
          </div>
          <div class="wireframe-body">
            <div class="wireframe-question">
              <div class="eyebrow" data-exam-part>Part 5: Incomplete Sentences</div>
              <h3 data-exam-question>Đang tải câu hỏi...</h3>
              <p data-exam-explain>Chọn đáp án đúng nhất. Kết quả sẽ hiển thị sau khi nộp bài.</p>
            </div>
            <div class="wireframe-answers" data-exam-answers></div>
          </div>
          <div class="exam-result-panel" data-exam-result hidden></div>
        </div>
      </section>
    </section>
  </main>
