<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu - EngWithMe</title>
  <link rel="icon" href="assets/icons/theme/logoEW.png" type="image/png">
  <link rel="stylesheet" href="css/base.css?v=1.2">
  <link rel="stylesheet" href="css/responsive/desktop.css">
  <link rel="stylesheet" href="css/responsive/tablet.css">
  <link rel="stylesheet" href="css/responsive/phone.css">
</head>
<body class="auth-body">
  <header class="site-header">
    <a class="brand" href="index.html">EngWithMe</a>
    <nav class="nav-links" aria-label="Menu chính">
        <a href="index.html">Home</a>
        <a href="vocabulary.html">Vocabulary</a>
        <a href="listening.html">Listening</a>
        <a href="reading.html">Reading</a>
        <a href="grammar.html">Grammar</a>
        <a href="quiz.html">Exam</a>
        <a href="blog.html">Blog</a>
        <a href="pricing.html">Premium</a>
      </nav>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="login.html"><span class="ti-shift-right"></span> Đăng nhập</a>
    </div>
  </header>

  <main class="auth-page auth-split">
    <section class="auth-copy" aria-labelledby="forgotTitle">
      <p class="eyebrow">Account Recovery</p>
      <h1 id="forgotTitle">Khôi phục mật khẩu</h1>
      <p>Đừng lo lắng! Nhập email của bạn và chúng tôi sẽ gửi liên kết khôi phục (demo).</p>
      <div class="auth-highlights" aria-label="Điểm nổi bật">
        <span><i class="ti-check"></i> An toàn, bảo mật</span>
        <span><i class="ti-check"></i> Nhanh chóng</span>
      </div>
    </section>

    <form class="auth-card auth-panel" data-forgot-form>
      <div class="auth-card-heading">
        <span class="auth-icon ti-key"></span>
        <div>
          <p class="eyebrow">Reset Password</p>
          <h2>Quên mật khẩu</h2>
        </div>
      </div>

      <label>Email
        <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </label>

      <button class="btn btn-primary" type="submit"><span class="ti-email"></span> Gửi yêu cầu</button>
      <p class="form-note"><a href="login.html">Quay lại đăng nhập</a></p>
      <p class="feedback" data-auth-feedback></p>
    </form>
  </main>

  <script src="js/core.js?v=1.0.2"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
