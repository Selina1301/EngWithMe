<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt lại mật khẩu - EngWithMe</title>
  <link rel="icon" href="assets/icons/theme/logoEW.png" type="image/png">
  <link rel="stylesheet" href="css/base.css?v=1.2">
  <link rel="stylesheet" href="css/responsive/desktop.css">
  <link rel="stylesheet" href="css/responsive/tablet.css">
  <link rel="stylesheet" href="css/responsive/phone.css">
</head>
<body class="auth-body">
  <header class="site-header">
    <a class="brand" href="index.html">EngWithMe</a>
    <nav class="nav-links" aria-label="Menu chính">
        <a href="index.html">Home</a>
        <a href="vocabulary.html">Vocabulary</a>
        <a href="listening.html">Listening</a>
        <a href="reading.html">Reading</a>
        <a href="grammar.html">Grammar</a>
        <a href="quiz.html">Exam</a>
        <a href="blog.html">Blog</a>
        <a href="pricing.html">Premium</a>
      </nav>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="login.html"><span class="ti-shift-right"></span> Đăng nhập</a>
    </div>
  </header>

  <main class="auth-page auth-split">
    <section class="auth-copy" aria-labelledby="resetTitle">
      <p class="eyebrow">New Password</p>
      <h1 id="resetTitle">Tạo mật khẩu mới</h1>
      <p>Hãy tạo một mật khẩu mạnh và dễ nhớ để tiếp tục học tập.</p>
      <div class="auth-highlights" aria-label="Điểm nổi bật">
        <span><i class="ti-check"></i> Có ít nhất 6 ký tự</span>
      </div>
    </section>

    <form class="auth-card auth-panel" data-reset-form>
      <div class="auth-card-heading">
        <span class="auth-icon ti-lock"></span>
        <div>
          <p class="eyebrow">Secure your account</p>
          <h2>Đặt lại mật khẩu</h2>
        </div>
      </div>

      <input type="hidden" name="token" id="reset-token-input">

      <label>Mật khẩu mới
        <div class="password-wrapper">
          <input type="password" name="password" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password" minlength="6" required>
          <span class="toggle-password ti-eye" aria-label="Hiện mật khẩu" role="button" tabindex="0"></span>
        </div>
      </label>
      <label>Nhập lại mật khẩu
        <div class="password-wrapper">
          <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu" autocomplete="new-password" minlength="6" required>
          <span class="toggle-password ti-eye" aria-label="Hiện mật khẩu" role="button" tabindex="0"></span>
        </div>
      </label>

      <button class="btn btn-primary" type="submit"><span class="ti-check"></span> Lưu mật khẩu</button>
      <p class="feedback" data-auth-feedback></p>
    </form>
  </main>

  <script src="js/core.js?v=1.0.2"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Extract token from URL and set it to hidden input
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const tokenInput = document.getElementById('reset-token-input');
    if (token && tokenInput) {
      tokenInput.value = token;
    } else {
      document.querySelector('[data-auth-feedback]').textContent = "Link khôi phục không hợp lệ hoặc không có token.";
      document.querySelector('[data-auth-feedback]').style.color = "var(--danger)";
      document.querySelector('button[type="submit"]').disabled = true;
    }
  </script>
</body>
</html>
