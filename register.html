<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - EnglishPath</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/responsive/desktop.css">
  <link rel="stylesheet" href="css/responsive/tablet.css">
  <link rel="stylesheet" href="css/responsive/phone.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">EnglishPath</a>
    <nav class="nav-links" aria-label="Menu chính">
      <a href="index.html">Trang chủ</a>
      <a href="lessons.html">Khóa học</a>
      <a href="quiz.html">Kiểm tra</a>
      <a href="vocabulary.html">Từ vựng</a>
    </nav>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="login.html">Đăng nhập</a>
    </div>
  </header>

  <main class="auth-page">
    <form class="auth-card" data-register-form>
      <p class="eyebrow">Start learning</p>
      <h1>Tạo tài khoản học viên</h1>
      <label>Họ tên <input type="text" name="name" placeholder="Nguyễn Văn A" required></label>
      <label>Email <input type="email" name="email" placeholder="student@example.com" required></label>
      <label>Mật khẩu <input type="password" name="password" placeholder="Tối thiểu 6 ký tự" minlength="6" required></label>
      <label>Mục tiêu học
        <select name="goal">
          <option>Giao tiếp hằng ngày</option>
          <option>IELTS Foundation</option>
          <option>TOEIC Basic</option>
          <option>Ôn lại từ mất gốc</option>
        </select>
      </label>
      <button class="btn btn-primary" type="submit">Đăng ký</button>
      <p class="form-note">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
      <p class="feedback" data-auth-feedback></p>
    </form>
  </main>

  <script src="js/core.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
